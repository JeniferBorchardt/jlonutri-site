<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#3d2e24" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Pagamento recebido · JLO Nutri</title>
  <meta name="description" content="Confirmação de pagamento — JLO Nutri. Em breve confirmamos seu horário pelo WhatsApp." />
  <link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=24" />

<body class="thanks-page">
  <main class="thanks">
    <div class="thanks__card">
      <img class="thanks__logo" src="assets/images/jlo-logo-desktop.png?v=20" alt="JLo Nutricionista" width="539" height="280" />
      <p class="eyebrow">Pagamento</p>
      <h1>Recebemos seu interesse</h1>
      <p class="thanks__lead">
        Se o pagamento foi concluído, obrigada! Em breve você recebe no WhatsApp a confirmação do horário e o link da videochamada.
      </p>
      <p class="thanks__lead">
        Se ainda não pagou ou ficou alguma dúvida, fale comigo agora:
      </p>
      <div class="thanks__actions">
        <a class="btn btn--whats btn--lg" id="thanksWhats" href="#" target="_blank" rel="noopener noreferrer">Falar no WhatsApp</a>
        <a class="btn btn--ghost btn--lg" href="index.html">Voltar ao site</a>
      </div>
      <p class="thanks__note">Jenifer Lopes Borchardt · CRN-2 · 13894</p>
    </div>
  </main>
  <script>
    const WHATSAPP_NUMBER = "5553981378527";
    const msg = "Olá, Jenifer! Acabei de fazer (ou tentei fazer) o pagamento pelo site. Pode me confirmar o horário da consulta?";
    document.getElementById("thanksWhats").href =
      "https://wa.me/" + WHATSAPP_NUMBER + "?text=" + encodeURIComponent(msg);
  </script>
</body>
</html>
